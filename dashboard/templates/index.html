<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudGovGuard | Enterprise CSPM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; height: 100vh; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar { width: 260px; background-color: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .logo-area { padding: 2rem; display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #818cf8); border-radius: 8px; }
        .logo-text { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent); }

        .nav-menu { flex: 1; padding: 1rem; }
        .nav-item { display: flex; align-items: center; padding: 0.85rem 1rem; color: var(--text-muted); text-decoration: none; border-radius: 10px; margin-bottom: 0.5rem; transition: all 0.2s ease; cursor: pointer; user-select: none; }
        .nav-item:hover { background: rgba(56, 189, 248, 0.05); color: var(--accent); }
        .nav-item.active { background: rgba(56, 189, 248, 0.1); color: var(--accent); font-weight: 600; }
        .nav-item .icon { margin-right: 12px; }

        /* MAIN CONTENT */
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .navbar { height: 70px; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 5; border-bottom: 1px solid var(--border); }
        .search-box input { background: var(--bg-dark); border: 1px solid var(--border); padding: 0.6rem 1rem; border-radius: 8px; color: white; width: 300px; outline: none; }
        
        .content-wrapper { padding: 2rem; max-width: 1600px; margin: 0 auto; width: 100%; }

        /* KPI CARDS */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 14px; border: 1px solid var(--border); transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-title { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .card-value { font-size: 2rem; font-weight: 700; }
        .trend { font-size: 0.8rem; margin-top: 0.5rem; font-weight: 500; }
        .trend.up { color: var(--critical); }
        .trend.down { color: var(--low); }

        /* CHARTS */
        .charts-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .chart-card { background: var(--card-bg); padding: 1.5rem; border-radius: 14px; border: 1px solid var(--border); min-height: 350px; }
        .chart-card h3 { margin-bottom: 1.5rem; font-size: 1rem; color: var(--text-muted); font-weight: 500; }
        .chart-container { position: relative; height: 250px; }

        /* ATTACK PATH */
        .attack-path-section { background: var(--card-bg); padding: 1.5rem; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .attack-path-container { display: flex; align-items: center; justify-content: space-around; padding: 2rem 0; overflow-x: auto; }
        .node { background: #0f172a; padding: 1.2rem; border: 1px solid var(--accent); border-radius: 10px; text-align: center; min-width: 180px; box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .arrow { font-size: 1.5rem; color: var(--accent); margin: 0 1rem; }

        /* TABLE */
        .table-container { background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
        .table-header { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #1e293b; text-align: left; padding: 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); position: sticky; top: 0; }
        tbody td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--text-main); }
        tbody tr:hover { background: rgba(255, 255, 255, 0.03); cursor: pointer; }
        
        .badge { padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge.critical { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid var(--critical); }
        .badge.high { background: rgba(249, 115, 22, 0.2); color: #fdba74; border: 1px solid var(--high); }
        .badge.medium { background: rgba(234, 179, 8, 0.2); color: #fde047; border: 1px solid var(--medium); }
        .badge.low { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid var(--low); }

        /* SKELETON PRELOADER */
        .loading-overlay { position: fixed; inset: 0; background: var(--bg-dark); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: var(--text-muted); letter-spacing: 2px;">SECURE BOOT...</p>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <span class="logo-text">CloudGov<span>Guard</span></span>
            </div>
            <nav class="nav-menu" id="navMenu">
                <div class="nav-item active" data-page="Dashboard">📊 Dashboard</div>
                <div class="nav-item" data-page="Resources">☁️ Resources</div>
                <div class="nav-item" data-page="Violations">🛡️ Violations</div>
                <div class="nav-item" data-page="Risk Score">🎯 Risk Score</div>
                <div class="nav-item" data-page="Attack Paths">⚡ Attack Paths</div>
            </nav>
            <div style="padding: 1.5rem; border-top: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 35px; height: 35px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;">JD</div>
                    <div>
                        <p style="font-size: 0.8rem; font-weight: 600;">John Doe</p>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">Admin Access</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <h1 id="page-title" style="font-size: 1.25rem;">Dashboard</h1>
                <div class="search-box">
                    <input type="text" placeholder="Search assets, policies, or CIDR...">
                </div>
            </header>

            <div id="dynamic-content" class="content-wrapper">
                </div>
        </main>
    </div>

    <script>
        const db = {
            summary: { resources: 1420, violations: 42, critical: 5, score: 82 },
            charts: {
                severity: [5, 12, 15, 10],
                resources: [600, 400, 300, 120],
                resourceLabels: ['Storage', 'Compute', 'IAM', 'Network'],
                policy: [40, 30, 20, 10],
                policyLabels: ['Identity', 'Encryption', 'Networking', 'Audit']
            },
            table: [
                { policy: "S3 Public Read", res: "prod-logs-v1", sev: "critical", find: "Bucket open to world", fix: "Apply IAM Block Public" },
                { policy: "MFA Disabled", res: "admin-root", sev: "high", find: "Root login w/o MFA", fix: "Enable Virtual MFA" },
                { policy: "SSH Open", res: "jump-host-01", sev: "high", find: "Port 22 open to 0.0.0.0", fix: "Limit to VPN IP" },
                { policy: "Unencrypted DB", res: "user-db-final", sev: "medium", find: "RDS storage unencrypted", fix: "Enable KMS Encryption" },
                { policy: "Old Access Keys", res: "svc-account-ci", sev: "low", find: "Key age > 90 days", fix: "Rotate Access Keys" }
            ],
            path: ["External Internet", "Web Server (CVE-2024)", "IAM Role: S3FullAccess", "Data Exfiltration"]
        };

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
                loadPage('Dashboard');
            }, 1000);

            // Add Click Listeners to Nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const pageName = this.getAttribute('data-page');
                    
                    // Update UI State
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('page-title').innerText = pageName;
                    
                    loadPage(pageName);
                });
            });
        };

        function loadPage(page) {
            const container = document.getElementById('dynamic-content');
            
            if (page === 'Dashboard') {
                container.innerHTML = `
                    <div class="kpi-grid" id="kpis"></div>
                    <div class="charts-grid">
                        <div class="chart-card">
                            <h3>Violations by Severity</h3>
                            <div class="chart-container"><canvas id="barChart"></canvas></div>
                        </div>
                        <div class="chart-card">
                            <h3>Resource Distribution</h3>
                            <div class="chart-container"><canvas id="dougnutChart"></canvas></div>
                        </div>
                        <div class="chart-card">
                            <h3>Policy Compliance</h3>
                            <div class="chart-container"><canvas id="pieChart"></canvas></div>
                        </div>
                    </div>
                    <div class="attack-path-section">
                        <h3 style="margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;">Visual Attack Path: 0-Day Vulnerability Chain</h3>
                        <div class="attack-path-container" id="attackPath"></div>
                    </div>
                    <div class="table-container">
                        <div class="table-header">
                            <h3>Active Security Violations</h3>
                            <span style="color: var(--accent); font-size: 0.8rem; cursor: pointer;">View All →</span>
                        </div>
                        <div style="overflow-x: auto;">
                            <table>
                                <thead>
                                    <tr><th>Policy</th><th>Resource</th><th>Severity</th><th>Finding</th><th>Remediation</th></tr>
                                </thead>
                                <tbody id="violationTable"></tbody>
                            </table>
                        </div>
                    </div>
                `;
                renderDashboardData();
            } else {
                container.innerHTML = `<div style="text-align: center; padding: 5rem; color: var(--text-muted);">
                    <h2>${page} Content</h2>
                    <p>Fetching real-time data from cloud providers...</p>
                </div>`;
            }
        }

        function renderDashboardData() {
            // Render KPIs
            document.getElementById('kpis').innerHTML = `
                <div class="card"><p class="card-title">Resources</p><p class="card-value">${db.summary.resources}</p><p class="trend down">↑ 12%</p></div>
                <div class="card"><p class="card-title">Violations</p><p class="card-value">${db.summary.violations}</p><p class="trend up">↑ 2 New</p></div>
                <div class="card"><p class="card-title">Critical</p><p class="card-value" style="color: var(--critical)">${db.summary.critical}</p><p class="trend up">Action</p></div>
                <div class="card" style="border-right: 4px solid var(--accent)"><p class="card-title">Score</p><p class="card-value" style="color: var(--accent)">${db.summary.score}%</p><p class="trend down">↓ 1%</p></div>
            `;

            // Render Table
            document.getElementById('violationTable').innerHTML = db.table.map(row => `
                <tr>
                    <td><strong>${row.policy}</strong></td>
                    <td style="color: var(--accent)">${row.res}</td>
                    <td><span class="badge ${row.sev}">${row.sev}</span></td>
                    <td style="color: var(--text-muted)">${row.find}</td>
                    <td><code style="background: #0f172a; padding: 2px 6px; border-radius: 4px;">${row.fix}</code></td>
                </tr>
            `).join('');

            // Render Attack Path
            document.getElementById('attackPath').innerHTML = db.path.map((step, i) => `
                <div class="node">
                    <p style="font-size: 0.6rem; color: var(--accent); margin-bottom: 5px;">STEP 0${i+1}</p>
                    <strong>${step}</strong>
                </div>
                ${i < db.path.length - 1 ? '<div class="arrow">➞</div>' : ''}
            `).join('');

            initCharts();
        }

        function initCharts() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }
            };

            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: ['Critical', 'High', 'Medium', 'Low'],
                    datasets: [{ label: 'Violations', data: db.charts.severity, backgroundColor: ['#ef4444', '#f97316', '#eab308', '#22c55e'], borderRadius: 5 }]
                },
                options: { ...commonOptions, scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
            });

            new Chart(document.getElementById('dougnutChart'), {
                type: 'doughnut',
                data: { labels: db.charts.resourceLabels, datasets: [{ data: db.charts.resources, backgroundColor: ['#38bdf8', '#818cf8', '#c084fc', '#fb7185'], borderWidth: 0 }] },
                options: commonOptions
            });

            new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: { labels: db.charts.policyLabels, datasets: [{ data: db.charts.policy, backgroundColor: ['#0ea5e9', '#6366f1', '#a855f7', '#f43f5e'], borderWidth: 0 }] },
                options: commonOptions
            });
        }
    </script>
</body>
</html>
