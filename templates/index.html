<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudGovGuard | Premium CSPM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="premium-dark">
    <div class="app-shell">
        <nav class="side-nav">
            <div class="logo">CGG<span>.</span></div>
            <div class="nav-links">
                <div class="nav-item active" data-view="dashboard"><i class="fas fa-layer-group"></i></div>
                <div class="nav-item" data-view="remediation"><i class="fas fa-shield-virus"></i></div>
                <div class="nav-item" data-view="inventory"><i class="fas fa-microchip"></i></div>
                <div class="nav-item" data-view="compliance"><i class="fas fa-file-contract"></i></div>
            </div>
            <button id="runScanBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i></button>
        </nav>

        <main class="main-view">
            <header class="view-header">
                <div class="title-meta">
                    <h1 id="page-title">Executive Overview</h1>
                    <p id="page-subtitle">Security Posture // System Live</p>
                </div>
            </header>

            <section id="view-dashboard" class="content-view active">
                <div class="kpi-container">
                    <div class="kpi-box"><small>TOTAL ASSETS</small><h2 id="val-assets">0</h2></div>
                    <div class="kpi-box crit"><small>CRITICAL RISKS</small><h2 id="val-critical">0</h2></div>
                    <div class="kpi-box"><small>ACTIVE THREATS</small><h2 id="val-violations">0</h2></div>
                    <div class="kpi-box score"><small>SECURITY SCORE</small><h2 id="val-score">0%</h2></div>
                </div>

                <div class="mid-section">
                    <div class="glass-card attack-visual">
                        <h3>Critical Attack Path</h3>
                        <div class="path-engine">
                            <div class="p-node"><i class="fas fa-globe"></i><span>Web</span></div>
                            <div class="p-line active"></div>
                            <div class="p-node warn"><i class="fas fa-lock-open"></i><span>SSH</span></div>
                            <div class="p-line active"></div>
                            <div class="p-node danger"><i class="fas fa-server"></i><span>Server</span></div>
                            <div class="p-line"></div>
                            <div class="p-node secure"><i class="fas fa-database"></i><span>PII Data</span></div>
                        </div>
                    </div>
                    <div class="glass-card chart-visual">
                        <h3>Severity Breakdown</h3>
                        <div class="chart-canvas-wrap">
                            <canvas id="severityChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="glass-card table-section">
                    <div class="table-header"><h3>Live Forensic Feed</h3></div>
                    <div class="scroll-table">
                        <table class="premium-table">
                            <thead>
                                <tr><th>RESOURCE</th><th>POLICY</th><th>SEVERITY</th><th>STATUS</th></tr>
                            </thead>
                            <tbody id="violationsBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="view-remediation" class="content-view">
                <div class="glass-card"><h3>Active Remediation Queue</h3><div id="remediationList"></div></div>
            </section>

            <section id="view-inventory" class="content-view">
                <div class="inventory-grid" id="inventoryBody"></div>
            </section>

            <section id="view-compliance" class="content-view">
                <div class="compliance-stack" id="complianceBody"></div>
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
