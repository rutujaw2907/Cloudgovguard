<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudGovGuard | Executive Command</title>
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="minimal-theme">
    <div class="app-container">
        <nav class="glass-sidebar">
            <div class="brand">CGG</div>
            <div class="menu">
                <div class="nav-item active" data-view="dashboard"><i class="fas fa-th-large"></i> Dashboard</div>
                <div class="nav-item" data-view="remediation"><i class="fas fa-shield-virus"></i> Threats</div>
                <div class="nav-item" data-view="inventory"><i class="fas fa-boxes"></i> Assets</div>
                <div class="nav-item" data-view="compliance"><i class="fas fa-clipboard-list"></i> Reports</div>
            </div>
            <button id="runScanBtn" class="scan-pill"><i class="fas fa-sync"></i> Refresh</button>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="welcome">
                    <h1 id="main-title">Executive Overview</h1>
                    <p id="sub-title">Real-time security posture across all cloud environments.</p>
                </div>
                </header>

            <section id="view-dashboard" class="view active">
                <div class="hero-stats">
                    <div class="stat-card"><label>Total Assets</label><h2 id="val-assets">0</h2></div>
                    <div class="stat-card crit"><label>Critical Risks</label><h2 id="val-critical">0</h2></div>
                    <div class="stat-card"><label>Active Violations</label><h2 id="val-violations">0</h2></div>
                    <div class="stat-card score"><label>Security Score</label><h2 id="val-score">0%</h2></div>
                </div>

                <div class="dashboard-grid">
                    <div class="glass-card attack-card">
                        <h3>Critical Attack Path</h3>
                        <div class="path-visual">
                            <div class="p-node"><i class="fas fa-globe"></i><span>Web</span></div>
                            <div class="p-link active"></div>
                            <div class="p-node warn"><i class="fas fa-door-open"></i><span>SSH</span></div>
                            <div class="p-link active"></div>
                            <div class="p-node danger"><i class="fas fa-microchip"></i><span>EC2</span></div>
                            <div class="p-link"></div>
                            <div class="p-node success"><i class="fas fa-database"></i><span>PII</span></div>
                        </div>
                    </div>
                    <div class="glass-card chart-card">
                        <h3>Severity Distribution</h3>
                        <div class="canvas-container"><canvas id="severityChart"></canvas></div>
                    </div>
                </div>

                <div class="glass-card table-card">
                    <h3>Recent Incidents</h3>
                    <div class="table-wrapper">
                        <table class="clean-table">
                            <thead><tr><th>Resource</th><th>Policy</th><th>Severity</th><th>Action</th></tr></thead>
                            <tbody id="violationsBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
            
            <section id="view-remediation" class="view">
                <div class="glass-card">
                    <h3>Remediation Queue</h3>
                    <div id="remediationBody"></div>
                </div>
            </section>

            <section id="view-inventory" class="view">
                <div class="inventory-grid" id="inventoryBody"></div>
            </section>

            <section id="view-compliance" class="view">
                <div class="compliance-list" id="complianceBody"></div>
            </section>
        </main>

        <aside id="sidePanel" class="slide-panel">
            <button id="closePanel" class="close-btn">&times;</button>
            <div id="panelBody"></div>
        </aside>
    </div>
    <script src="../static/script.js"></script>
</body>
</html>
